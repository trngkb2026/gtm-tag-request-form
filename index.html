<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTMタグ設置依頼フォーム</title>
<style>
  :root {
    --primary: #0071e3;
    --primary-hover: #0077ed;
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --border: #d2d2d7;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --error: #ff3b30;
    --success: #34c759;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 20px;
  }
  .container { max-width: 560px; margin: 0 auto; padding-bottom: 40px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
  .card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 16px;
  }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label.lbl {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .req { color: var(--error); margin-left: 2px; }
  .hint { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  select, input[type="text"], input[type="date"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: white;
    transition: border-color .15s;
  }
  select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,113,227,.12);
  }
  textarea { resize: vertical; min-height: 80px; }
  /* カレンダーアイコンを左側に表示 */
  input[type="date"] {
    position: relative;
    padding-left: 36px;
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    opacity: .6;
    font-size: 16px;
  }
  .radio-group, .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
  }
  .radio-group label, .checkbox-group label {
    font-weight: 400;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .radio-group input, .checkbox-group input {
    width: 16px; height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
  }
  .lp-select-container {
    position: relative;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    transition: border-color .15s;
  }
  .lp-select-container.focused {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,113,227,.12);
  }
  .lp-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px;
    min-height: 42px;
    cursor: text;
  }
  .lp-tag {
    display: inline-flex;
    align-items: center;
    background: #e8f0fe;
    color: #1a73e8;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 14px;
    gap: 4px;
    white-space: nowrap;
  }
  .lp-tag .remove {
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    opacity: 0.6;
    margin-left: 2px;
  }
  .lp-tag .remove:hover { opacity: 1; }
  .lp-search {
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    padding: 4px 8px !important;
    font-size: 13px;
    min-width: 140px;
    flex: 1;
  }
  .lp-dropdown {
    position: absolute;
    top: 100%;
    left: -1.5px;
    right: -1.5px;
    max-height: 220px;
    overflow-y: auto;
    background: white;
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    z-index: 10;
    display: none;
  }
  .lp-dropdown.show { display: block; }
  .lp-option {
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background .1s;
  }
  .lp-option:hover { background: #f1f3f4; }
  .lp-option.selected { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
  .lp-count { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
  .lp-group-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }
  .lp-group-btn {
    padding: 4px 10px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .lp-group-btn:hover { border-color: var(--primary); color: var(--primary); }
  .lp-group-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    font-weight: 600;
  }
  .lp-group-btn .cnt {
    font-size: 10px;
    opacity: .7;
    margin-left: 2px;
  }
  .platform-other-wrap { display: none; margin-top: 8px; }
  .platform-other-wrap.show { display: block; }
  .agency-other-wrap { display: none; margin-top: 8px; }
  .agency-other-wrap.show { display: block; }
  .tag-code-wrap { display: none; margin-top: 14px; }
  .tag-code-wrap.show { display: block; }
  textarea.tag-code { font-family: monospace; font-size: 12px; min-height: 540px; }
  .date-readonly {
    font-size: 14px;
    color: var(--text-secondary);
    padding: 10px 12px;
    background: #f5f5f7;
    border-radius: 8px;
    border: 1.5px solid #e5e5ea;
  }
  .tag-name-preview {
    font-size: 13px;
    color: var(--primary);
    margin-top: 8px;
    padding: 8px 12px;
    background: #e8f0fe;
    border-radius: 6px;
    display: none;
  }
  .tag-name-preview.show { display: block; }
  /* ── Preview Panel ── */
  .preview-panel {
    background: #f0f7ff;
    border: 1.5px solid #b3d4fc;
    border-radius: 10px;
    padding: 16px 20px;
    margin-top: 16px;
    display: none;
  }
  .preview-panel.show { display: block; }
  .preview-panel-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .preview-row {
    display: flex;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 8px;
  }
  .preview-row:last-child { margin-bottom: 0; }
  .preview-label {
    font-size: 11px;
    font-weight: 600;
    color: #5a6a7a;
    text-transform: uppercase;
    letter-spacing: .04em;
    min-width: 80px;
    padding-top: 2px;
    white-space: nowrap;
  }
  .preview-value {
    font-size: 13px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    color: #1a3a5c;
    word-break: break-all;
    line-height: 1.5;
    background: white;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid #dce8f5;
    flex: 1;
  }
  .preview-value.url { color: var(--primary); }
  .preview-value.tag-name { color: #0d7a3e; }
  .preview-value.trigger { color: #b45309; }
  .preview-urls-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
  }
  .preview-url-item {
    font-size: 12px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    color: var(--primary);
    background: white;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid #dce8f5;
    word-break: break-all;
    line-height: 1.4;
  }
  .preview-count-badge {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 4px;
  }
  .submit-section { margin-top: 24px; }
  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .submit-btn:hover { background: var(--primary-hover); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 14px 24px;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    transform: translateX(120%);
    transition: transform .3s;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--error); }
</style>
</head>
<body>

<div class="container">
  <h1>GTMタグ設置依頼フォーム</h1>
  <p class="subtitle">cp.s-herb.com (GTM-59HCJW) — 送信するとChatWorkに自動通知されます</p>

  <form id="gtmForm">

    <div class="card">

      <div class="field">
        <label class="lbl">代理店 / 運用者<span class="req">*</span></label>
        <select id="agency" required>
          <option value="">選択してください</option>
          <option value="N&M">N&M</option>
          <option value="星組">星組</option>
          <option value="自社運用">自社運用</option>
          <option value="AA">AA</option>
          <option value="トリックトラック(TT)">トリックトラック(TT)</option>
          <option value="ZEALS">ZEALS</option>
          <option value="PIALA">PIALA</option>
          <option value="URR">URR</option>
          <option value="Dashboard">Dashboard</option>
          <option value="CyberAgent">CyberAgent</option>
          <option value="Anagrams">Anagrams</option>
          <option value="オプティマイザー">オプティマイザー</option>
          <option value="メディパートナー(MP)">メディパートナー(MP)</option>
          <option value="MONKEY">MONKEY</option>
          <option value="ロードランナー">ロードランナー</option>
          <option value="FS">FS</option>
          <option value="afb">afb</option>
          <option value="平島SA">平島SA</option>
          <option value="プレグロ">プレグロ</option>
          <option value="フェルマ">フェルマ</option>
          <option value="ユニバースフィット">ユニバースフィット</option>
          <option value="other">その他</option>
        </select>
        <div class="agency-other-wrap" id="agencyOtherWrap">
          <input type="text" id="agencyOther" placeholder="代理店 / 運用者名を入力" oninput="updateTagPreview()">
        </div>
      </div>

      <div class="field">
        <label class="lbl">媒体<span class="req">*</span></label>
        <div class="checkbox-group" id="platformGroup">
          <label><input type="checkbox" name="platform" value="Meta"> Meta</label>
          <label><input type="checkbox" name="platform" value="LINE"> LINE</label>
          <label><input type="checkbox" name="platform" value="Google"> Google</label>
          <label><input type="checkbox" name="platform" value="Yahoo"> Yahoo</label>
          <label><input type="checkbox" name="platform" value="SmartNews"> SmartNews</label>
          <label><input type="checkbox" name="platform" value="TikTok"> TikTok</label>
          <label><input type="checkbox" name="platform" value="X(Twitter)"> X(Twitter)</label>
          <label><input type="checkbox" name="platform" value="YouTube"> YouTube</label>
          <label><input type="checkbox" name="platform" value="Criteo"> Criteo</label>
          <label><input type="checkbox" name="platform" value="Microsoft"> Microsoft</label>
          <label><input type="checkbox" name="platform" value="YDA"> YDA</label>
          <label><input type="checkbox" name="platform" value="アウトブレイン"> アウトブレイン</label>
          <label><input type="checkbox" name="platform" value="other"> その他</label>
        </div>
        <div class="platform-other-wrap" id="platformOtherWrap">
          <input type="text" id="platformOther" placeholder="媒体名を入力" oninput="updateTagPreview()">
        </div>
      </div>

      <div class="field">
        <label class="lbl">対象LP<span class="req">*</span></label>
        <div class="lp-group-bar" id="lpGroupBar">
          <button type="button" class="lp-group-btn active" data-group="all">全て<span class="cnt">237</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1J">PKG1J<span class="cnt">59</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1N">PKG1N<span class="cnt">17</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1G">PKG1G<span class="cnt">10</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1L">PKG1L<span class="cnt">5</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1Q">PKG1Q<span class="cnt">7</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1R">PKG1R<span class="cnt">7</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1KS">PKG1KS<span class="cnt">3</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1_IC">PKG1_IC<span class="cnt">3</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG1他">PKG1他<span class="cnt">8</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG3C">PKG3C<span class="cnt">16</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG3E">PKG3E<span class="cnt">9</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG3D">PKG3D<span class="cnt">2</span></button>
          <button type="button" class="lp-group-btn" data-group="PKG3K">PKG3K<span class="cnt">5</span></button>
          <button type="button" class="lp-group-btn" data-group="PC1A">PC1A<span class="cnt">22</span></button>
          <button type="button" class="lp-group-btn" data-group="PC15D">PC15D<span class="cnt">7</span></button>
          <button type="button" class="lp-group-btn" data-group="PCPKG">PCPKG<span class="cnt">7</span></button>
          <button type="button" class="lp-group-btn" data-group="PK22H">PK22H<span class="cnt">3</span></button>
          <button type="button" class="lp-group-btn" data-group="PK22J">PK22J<span class="cnt">3</span></button>
          <button type="button" class="lp-group-btn" data-group="PK22L">PK22L<span class="cnt">5</span></button>
          <button type="button" class="lp-group-btn" data-group="MPC1A">MPC1A<span class="cnt">5</span></button>
          <button type="button" class="lp-group-btn" data-group="MPK">MPK<span class="cnt">10</span></button>
          <button type="button" class="lp-group-btn" data-group="PLTP">PLTP<span class="cnt">3</span></button>
          <button type="button" class="lp-group-btn" data-group="その他">その他<span class="cnt">21</span></button>
        </div>
        <div class="lp-select-container" id="lpContainer">
          <div class="lp-tags" id="lpTags">
            <input type="text" class="lp-search" id="lpSearch" placeholder="LP名で検索...">
          </div>
          <div class="lp-dropdown" id="lpDropdown"></div>
        </div>
        <div class="lp-count" id="lpCount">0件選択中</div>
      </div>

      <div class="tag-name-preview" id="tagNamePreview"></div>

      <div class="field">
        <label class="lbl">発火ページ<span class="req">*</span></label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="pageType" value="LP TOP"> LP TOP</label>
          <label><input type="checkbox" name="pageType" value="確認画面"> 確認画面</label>
          <label><input type="checkbox" name="pageType" value="再確認画面"> 再確認画面</label>
          <label><input type="checkbox" name="pageType" value="サンクスページ"> サンクスページ</label>
        </div>
      </div>

      <!-- ── Preview Panel ── -->
      <div class="preview-panel" id="previewPanel">
        <div class="preview-panel-title">✅ 設置プレビュー <span style="font-size:11px;font-weight:400;color:#6e6e73">— 対象URLを確認してください</span></div>
        <div class="preview-row">
          <span class="preview-label">🌐 対象URL</span>
          <div class="preview-urls-list" id="previewUrls"></div>
        </div>
        <div class="preview-row" id="previewTagNameRow">
          <span class="preview-label">🏷️ タグ名称</span>
          <div class="preview-urls-list" id="previewTagNames"></div>
        </div>
        <div class="preview-row" id="previewTriggerRow" style="display:none">
          <span class="preview-label">⚡ トリガー</span>
          <span class="preview-value trigger" id="previewTrigger">—</span>
        </div>
      </div>

      <div class="field">
        <label class="lbl">作業種別<span class="req">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="workType" value="既存タグへトリガー追加" required checked> 既存タグへトリガー追加</label>
          <label><input type="radio" name="workType" value="新規タグ作成＋トリガー設定"> 新規タグ作成＋トリガー設定</label>
        </div>
        <div class="tag-code-wrap" id="tagCodeWrap">
          <label class="lbl" style="margin-top:10px">タグコード / スニペット<span class="req">*</span></label>
          <div class="hint">媒体から発行されたピクセルコード・コンバージョンタグなどをそのまま貼り付けてください</div>
          <textarea class="tag-code" id="tagCode" placeholder="&lt;script&gt;...タグコードをここに貼り付け...&lt;/script&gt;"></textarea>
        </div>
      </div>

      <div class="field">
        <label class="lbl">設置希望日</label>
        <input type="date" id="desiredDate">
      </div>

      <div class="field">
        <label class="lbl">依頼者<span class="req">*</span></label>
        <select id="requester" required>
          <option value="">選択してください</option>
          <option value="宇留野">宇留野</option>
          <option value="小松崎">小松崎</option>
          <option value="蓮井">蓮井</option>
          <option value="龍山">龍山</option>
        </select>
      </div>

      <div class="field">
        <label class="lbl" style="color:var(--text-secondary)">依頼日（自動記録）</label>
        <div class="date-readonly" id="requestDate"></div>
      </div>

    </div>

    <div class="submit-section">
      <button type="submit" class="submit-btn" id="submitBtn">タグ設置依頼する</button>
    </div>

  </form>
</div>

document.addEventListener('DOMContentLoaded', () => {

      const wrap = document.getElementById('platformOtherWrap');
      if (otherChecked) {
        wrap.classList.add('show');
        document.getElementById('platformOther').focus();
      } else {
        wrap.classList.remove('show');
      }

    });
  });

      document.getElementById('agencyOther').focus();
    } else {

      const wrap = document.getElementById('tagCodeWrap');

        wrap.classList.add('show');
      } else {
        wrap.classList.remove('show');
        document.getElementById('tagCode').value = '';
      }
    });
  });

  initLPSelect();
  document.getElementById('gtmForm').addEventListener('submit', handleSubmit);

  // pageType checkbox → プレビュー更新
  document.querySelectorAll('input[name="pageType"]').forEach(cb => {
    cb.addEventListener('change', () => {
      updatePreviewPanel();
    });
  });
});

function updateTagPreview() {
  const agencySelect = document.getElementById('agency');
  let agency = agencySelect.value;
  if (agency === 'other') {
    agency = document.getElementById('agencyOther').value.trim() || '(代理店名)';
  }

  const checkedPlatforms = Array.from(document.querySelectorAll('input[name="platform"]:checked'));
  const preview = document.getElementById('tagNamePreview');

  if (!agency || checkedPlatforms.length === 0) {
    preview.classList.remove('show');
  } else {
    const platforms = checkedPlatforms.map(cb => {
      if (cb.value === 'other') {
        return document.getElementById('platformOther').value.trim() || '(媒体名)';
      }
      return cb.value;
    });
    const tagName = `${agency} - ${platforms.join(' / ')}`;
    preview.textContent = `自動生成タグ名: ${tagName}`;
    preview.classList.add('show');
  }

  updatePreviewPanel();
}

// ── URL / タグ名 / トリガー プレビュー ──
function updatePreviewPanel() {
  const panel = document.getElementById('previewPanel');
  const urlsEl = document.getElementById('previewUrls');
  const triggerEl = document.getElementById('previewTrigger');

  const pageTypes = [...document.querySelectorAll('input[name="pageType"]:checked')].map(c => c.value);

  if (selectedLPs.length === 0 || pageTypes.length === 0) {
    panel.classList.remove('show');
    return;
  }

  // ── URL Preview（実データベース）──
  // URL Preview（実データ: LP_CAMPAIGN_MAPベース）
  const urls = [];
  selectedLPs.forEach(lp => {
    pageTypes.forEach(pt => {
      if (pt === 'LP TOP') {
        urls.push({ url: `https://cp.s-herb.com/${lp}`, lp, page: 'LP', valid: true });
      } else if (pt === '確認画面') {
        const cid = LP_CAMPAIGN_MAP[lp];
        if (cid) {
          urls.push({ url: `https://cp.s-herb.com/orders/${cid}/confirm`, lp, page: '確認', valid: true });
        } else {
          urls.push({ url: `⚠ ${lp} → campaign_id 未登録`, lp, page: '確認', valid: false });
        }
      } else if (pt === '再確認画面') {
        const cid = LP_CAMPAIGN_MAP[lp];
        if (cid) {
          urls.push({ url: `https://cp.s-herb.com/orders/${cid}/reconfirm`, lp, page: '再確認', valid: true });
        } else {
          urls.push({ url: `⚠ ${lp} → campaign_id 未登録`, lp, page: '再確認', valid: false });
        }
      } else if (pt === 'サンクスページ') {
        const cid = LP_CAMPAIGN_MAP[lp];
        if (cid) {
          urls.push({ url: `https://cp.s-herb.com/orders/thanks/${cid}/landing`, lp, page: 'Thanks', valid: true });
        } else {
          urls.push({ url: `⚠ ${lp} → campaign_id 未登録`, lp, page: 'Thanks', valid: false });
        }
      }
    });
  });

  // Show max 8 URLs, then summarize
  if (urls.length === 0) {
    panel.classList.remove('show');
    return;
  }
  const maxShow = 8;
  urlsEl.innerHTML = '';
  urls.slice(0, maxShow).forEach(u => {
    const div = document.createElement('div');
    div.className = 'preview-url-item';
    if (!u.valid) {
      div.style.color = '#b45309';
      div.style.borderColor = '#fde68a';
      div.style.background = '#fffbeb';
    }
    div.textContent = u.url;
    urlsEl.appendChild(div);
  });
  if (urls.length > maxShow) {
    const more = document.createElement('div');
    more.style.cssText = 'font-size:12px;color:var(--text-secondary);padding:2px 0;';
    more.textContent = `...他 ${urls.length - maxShow} 件`;
    urlsEl.appendChild(more);
  }

  // ── Tag Name Preview（発火ページ別） ──
  const agencySelect = document.getElementById('agency');
  let agency = agencySelect.value;
  if (agency === 'other') {
    agency = document.getElementById('agencyOther').value.trim() || '(代理店)';
  }
  const checkedPlatforms = Array.from(document.querySelectorAll('input[name="platform"]:checked'));
  const platforms = checkedPlatforms.map(cb => {
    if (cb.value === 'other') return document.getElementById('platformOther').value.trim() || '(媒体)';
    return cb.value;
  });
  const platformStr = platforms.length > 0 ? platforms.join(' / ') : '(媒体)';
  const pageLabelMap = { 'LP TOP': 'LP', '確認画面': '確認画面', '再確認画面': '再確認', 'サンクスページ': 'サンクス' };

  const tagNamesEl = document.getElementById('previewTagNames');
  tagNamesEl.innerHTML = '';
  const generatedTagNames = [];
  pageTypes.forEach(pt => {
    const label = pageLabelMap[pt] || pt;
    const name = `${agency || '(代理店)'} - ${platformStr} ${label}`;
    generatedTagNames.push(name);
    const div = document.createElement('div');
    div.className = 'preview-url-item';
    div.style.color = '#0d7a3e';
    div.style.borderColor = '#bbf7d0';
    div.textContent = name;
    tagNamesEl.appendChild(div);
  });
  // Store for submit
  window._generatedTagNames = generatedTagNames;

  // ── Trigger Preview ──
  const triggerParts = [];
  pageTypes.forEach(pt => {
    if (pt === 'LP TOP') {
      if (selectedLPs.length === 1) {
        triggerParts.push(`Page URL starts with "/${selectedLPs[0]}"`);
      } else {
        triggerParts.push(`Page URL RegEx: LP TOP × ${selectedLPs.length}件`);
      }
    } else if (pt === 'サンクスページ') {
      const mapped = selectedLPs.filter(lp => LP_CAMPAIGN_MAP[lp]);
      const unmapped = selectedLPs.filter(lp => !LP_CAMPAIGN_MAP[lp]);
      if (mapped.length === 1) {
        triggerParts.push(`Page URL contains "/orders/thanks/${LP_CAMPAIGN_MAP[mapped[0]]}"`);
      } else if (mapped.length > 1) {
        triggerParts.push(`Page URL RegEx: thanks × ${mapped.length}件`);
      }
      if (unmapped.length > 0) {
        triggerParts.push(`⚠ campaign_id未登録: ${unmapped.join(', ')}`);
      }
    }
  });
  triggerEl.textContent = triggerParts.join(' ＋ ') || '—';

  panel.classList.add('show');
}


function initLPSelect() {
  const search = document.getElementById('lpSearch');
  const dropdown = document.getElementById('lpDropdown');
  const container = document.getElementById('lpContainer');

  // グループピルのクリックハンドラ設定
  document.querySelectorAll('.lp-group-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.group;
      activeGroup = (group === 'all') ? null : group;
      document.querySelectorAll('.lp-group-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      search.value = '';
      renderDropdown('');
      dropdown.classList.add('show');
      container.classList.add('focused');
      search.focus();
    });
  });

  search.addEventListener('focus', () => {
    container.classList.add('focused');
    renderDropdown(search.value);
    dropdown.classList.add('show');
  });
  search.addEventListener('input', () => {
    renderDropdown(search.value);
    dropdown.classList.add('show');
  });
  document.addEventListener('click', (e) => {
    if (!container.contains(e.target) && !e.target.closest('.lp-group-btn')) {
      dropdown.classList.remove('show');
      container.classList.remove('focused');
    }
  });
  document.getElementById('lpTags').addEventListener('click', () => search.focus());
}

function renderDropdown(query) {
  const dropdown = document.getElementById('lpDropdown');
  const q = query.toLowerCase();

  // グループフィルタ適用
  let pool = LP_NAMES;
  if (activeGroup && LP_GROUPS[activeGroup]) {
    pool = LP_GROUPS[activeGroup];
  }
  const filtered = pool.filter(name => name.toLowerCase().includes(q));

  dropdown.innerHTML = filtered.slice(0, 50).map(name => {
    const isSel = selectedLPs.includes(name);
    return `<div class="lp-option${isSel ? ' selected' : ''}" data-lp="${name}">${name}</div>`;
  }).join('');

  if (filtered.length > 50) {
    dropdown.innerHTML += `<div class="lp-option" style="color:var(--text-secondary);cursor:default;font-size:12px">...他${filtered.length - 50}件（絞り込んでください）</div>`;
  }
  if (filtered.length === 0) {
    dropdown.innerHTML = `<div class="lp-option" style="color:var(--text-secondary);cursor:default">該当なし</div>`;
  }

  dropdown.querySelectorAll('.lp-option[data-lp]').forEach(opt => {
    opt.addEventListener('click', () => {
      const lp = opt.dataset.lp;
      if (selectedLPs.includes(lp)) {
        selectedLPs = selectedLPs.filter(x => x !== lp);
      } else {
        selectedLPs.push(lp);
      }
      renderTags();
      renderDropdown(document.getElementById('lpSearch').value);
    });
  });
}

function renderTags() {
  const tagsEl = document.getElementById('lpTags');
  const search = document.getElementById('lpSearch');
  tagsEl.innerHTML = '';
  selectedLPs.forEach(lp => {
    const tag = document.createElement('span');
    tag.className = 'lp-tag';
    tag.innerHTML = `${lp}<span class="remove" data-lp="${lp}">&times;</span>`;
    tagsEl.appendChild(tag);
  });
  tagsEl.appendChild(search);
  document.getElementById('lpCount').textContent = `${selectedLPs.length}件選択中`;

  tagsEl.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedLPs = selectedLPs.filter(x => x !== btn.dataset.lp);
      renderTags();
      renderDropdown(document.getElementById('lpSearch').value);
    });
  });

  updatePreviewPanel();
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 4000);
}

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');

  const requester = document.getElementById('requester').value;

  // 代理店/運用者（その他対応）
  const agencySelect = document.getElementById('agency');
  let agency = agencySelect.value;
  if (agency === 'other') {
    agency = document.getElementById('agencyOther').value.trim();
  }

  // 媒体（複数選択 → 配列）
  const checkedPlatforms = Array.from(document.querySelectorAll('input[name="platform"]:checked'));
  const platforms = checkedPlatforms.map(cb => {
    if (cb.value === 'other') {
      return document.getElementById('platformOther').value.trim() || 'その他';
    }
    return cb.value;
  });

  const workTypeRadio = document.querySelector('input[name="workType"]:checked');
  const tagCode = document.getElementById('tagCode').value.trim();
  const pageTypes = [...document.querySelectorAll('input[name="pageType"]:checked')].map(c => c.value);
  const desiredDate = document.getElementById('desiredDate').value;

  // バリデーション
  if (!requester || !agency) {
    showToast('必須項目を入力してください', 'error');
    return;
  }
  if (platforms.length === 0) {
    showToast('媒体を1つ以上選択してください', 'error');
    return;
  }
  if (selectedLPs.length === 0) {
    showToast('対象LPを1つ以上選択してください', 'error');
    return;
  }
  if (pageTypes.length === 0) {
    showToast('発火ページを1つ以上選択してください', 'error');
    return;
  }
  const isNewTag = workTypeRadio?.value === '新規タグ作成＋トリガー設定';
  if (isNewTag && !tagCode) {
    showToast('タグコード / スニペットを入力してください', 'error');
    return;
  }

  const tagName = `${agency} - ${platforms.join(' / ')}`;

  // プレビューURL生成（ChatWork通知用）
  const previewUrls = [];
  selectedLPs.forEach(lp => {
    pageTypes.forEach(pt => {
      if (pt === 'LP TOP') {
        previewUrls.push(`https://cp.s-herb.com/${lp}`);
      } else if (pt === '確認画面') {
        const cid = LP_CAMPAIGN_MAP[lp];
        if (cid) previewUrls.push(`https://cp.s-herb.com/orders/${cid}/confirm`);
      } else if (pt === '再確認画面') {
        const cid = LP_CAMPAIGN_MAP[lp];
        if (cid) previewUrls.push(`https://cp.s-herb.com/orders/${cid}/reconfirm`);
      } else if (pt === 'サンクスページ') {
        const cid = LP_CAMPAIGN_MAP[lp];
        if (cid) previewUrls.push(`https://cp.s-herb.com/orders/thanks/${cid}/landing`);
      }
    });
  });

  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const data = {
      requester,
      agency,
      platform: platforms.join(' / '),
      tagName,
      tagNames: window._generatedTagNames || [],
      workType: workTypeRadio ? workTypeRadio.value : '',
      tagCode: isNewTag ? tagCode : '',
      pageTypes,
      lpNames: selectedLPs,
      previewUrls,
      desiredDate: desiredDate || '指定なし',
      requestDate: document.getElementById('requestDate').textContent
    };

    const res = await fetch(NOTIFY_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      showToast('ChatWorkに依頼を送信しました', 'success');
      document.getElementById('gtmForm').reset();
      selectedLPs = [];
      renderTags();
      document.getElementById('platformOtherWrap').classList.remove('show');
      document.getElementById('agencyOtherWrap').classList.remove('show');
      document.getElementById('tagCodeWrap').classList.remove('show');
      document.getElementById('tagNamePreview').classList.remove('show');
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('requestDate').textContent =
        `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    } else {
      const err = await res.json();
      showToast(`送信エラー: ${err.error}`, 'error');
    }
  } catch (error) {
    showToast(`通信エラー: ${error.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'タグ設置依頼する';
  }
}
</script>
