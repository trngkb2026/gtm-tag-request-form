name: Weekly LP List Update

on:
  schedule:
    # 毎週月曜 AM 7:00 JST (= 日曜 22:00 UTC)
    - cron: '0 22 * * 0'
  workflow_dispatch: # 手動実行も可能

jobs:
  update-lps:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape campaigns
        env:
          ACCOUNT_ID: ${{ secrets.URERUD2C_ACCOUNT_ID }}
          LOGIN_ID: ${{ secrets.URERUD2C_LOGIN_ID }}
          PASSWORD: ${{ secrets.URERUD2C_PASSWORD }}
        run: |
          python campaign_scraper_requests.py scrape \
            --account-id "$ACCOUNT_ID" \
            --login-id "$LOGIN_ID" \
            --password "$PASSWORD" \
            --output output/campaigns.json

      - name: Update form LP list
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_form_lps.py --input output/campaigns.json

      - name: Upload campaigns.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: campaigns-${{ github.run_number }}
          path: output/campaigns.json
          retention-days: 30
